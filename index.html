<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로켓런칭 매출 시뮬레이터</title>
  <style>
    :root {
      --primary: #FF5A1F;
      --primary-light: #FFF0EB;
      --primary-dark: #E04010;
      --gray-50: #F9FAFB;
      --gray-100: #F3F4F6;
      --gray-200: #E5E7EB;
      --gray-300: #D1D5DB;
      --gray-500: #6B7280;
      --gray-700: #374151;
      --gray-900: #111827;
      --green: #10B981;
      --green-light: #ECFDF5;
      --blue: #3B82F6;
      --blue-light: #EFF6FF;
      --red: #EF4444;
      --red-light: #FEF2F2;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
      --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--gray-100);
      color: var(--gray-900);
      font-size: 14px;
      line-height: 1.5;
    }

    /* Header */
    .header {
      background: #fff;
      border-bottom: 1px solid var(--gray-200);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 32px;
      height: 56px;
    }
    .logo {
      font-size: 16px;
      font-weight: 700;
      color: var(--primary);
      white-space: nowrap;
    }
    .tabs {
      display: flex;
      gap: 4px;
    }
    .tab {
      padding: 6px 16px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--gray-500);
      border-radius: 8px;
      transition: all .15s;
      white-space: nowrap;
    }
    .tab:hover { background: var(--gray-100); color: var(--gray-700); }
    .tab.active { background: var(--primary-light); color: var(--primary); }

    /* Layout */
    .page { display: none; }
    .page.active { display: block; }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    /* Cards */
    .card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px 24px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 16px;
    }

    /* Grid */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

    /* Form */
    .field { margin-bottom: 12px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-700);
      margin-bottom: 4px;
    }
    .field-unit {
      display: flex;
      align-items: center;
      gap: 0;
    }
    .field input {
      width: 100%;
      padding: 8px 12px;
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      font-size: 14px;
      color: var(--gray-900);
      background: var(--gray-50);
      transition: border-color .15s;
      -moz-appearance: textfield;
    }
    .field input::-webkit-outer-spin-button,
    .field input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .field input:focus { outline: none; border-color: var(--primary); background: #fff; }
    .field .unit {
      font-size: 12px;
      color: var(--gray-500);
      margin-left: 6px;
      white-space: nowrap;
    }
    .field-with-unit input { border-radius: 8px 0 0 8px; }
    .field-with-unit .unit-badge {
      padding: 8px 10px;
      background: var(--gray-100);
      border: 1.5px solid var(--gray-200);
      border-left: none;
      border-radius: 0 8px 8px 0;
      font-size: 12px;
      color: var(--gray-500);
      white-space: nowrap;
    }
    .hint { font-size: 11px; color: var(--gray-500); margin-top: 3px; }

    /* Results */
    .result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }
    .result-item {
      background: var(--gray-50);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .result-item.highlight {
      background: var(--primary-light);
    }
    .result-item.highlight-green {
      background: var(--green-light);
    }
    .result-item label {
      font-size: 11px;
      color: var(--gray-500);
      font-weight: 500;
      display: block;
      margin-bottom: 4px;
    }
    .result-item .value {
      font-size: 20px;
      font-weight: 700;
      color: var(--gray-900);
    }
    .result-item.highlight .value { color: var(--primary); }
    .result-item.highlight-green .value { color: var(--green); }
    .result-item .value-unit {
      font-size: 12px;
      font-weight: 500;
      color: var(--gray-500);
      margin-left: 2px;
    }

    /* Funnel */
    .funnel {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 4px 0;
    }
    .funnel-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .funnel-step label { font-size: 10px; color: var(--gray-500); }
    .funnel-step .num {
      font-size: 18px;
      font-weight: 700;
      color: var(--gray-900);
    }
    .funnel-arrow { color: var(--gray-300); font-size: 18px; margin-top: 10px; }
    .funnel-rate { font-size: 10px; color: var(--primary); font-weight: 600; }

    /* Divider */
    .divider { height: 1px; background: var(--gray-100); margin: 16px 0; }

    /* Button */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all .15s;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary {
      background: var(--gray-100);
      color: var(--gray-700);
      border: 1px solid var(--gray-200);
    }
    .btn-secondary:hover { background: var(--gray-200); }
    .btn-danger { background: var(--red-light); color: var(--red); border: 1px solid #FECACA; }
    .btn-danger:hover { background: #FEE2E2; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }

    /* Compare table */
    .compare-table { width: 100%; border-collapse: collapse; }
    .compare-table th, .compare-table td {
      padding: 10px 14px;
      text-align: right;
      border-bottom: 1px solid var(--gray-100);
      font-size: 13px;
    }
    .compare-table th:first-child, .compare-table td:first-child { text-align: left; }
    .compare-table thead th {
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-500);
      background: var(--gray-50);
    }
    .compare-table .diff-pos { color: var(--green); font-weight: 600; }
    .compare-table .diff-neg { color: var(--red); font-weight: 600; }
    .compare-table .section-header td {
      font-weight: 600;
      color: var(--gray-700);
      background: var(--gray-50);
      font-size: 12px;
      padding: 6px 14px;
    }

    /* Scenario cards */
    .scenario-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
    .scenario-card {
      background: #fff;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 16px;
    }
    .scenario-card.selected { border-color: var(--primary); background: var(--primary-light); }
    .scenario-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .scenario-name { font-weight: 700; font-size: 15px; }
    .scenario-meta { font-size: 11px; color: var(--gray-500); margin-top: 2px; }
    .scenario-stats { display: flex; gap: 12px; flex-wrap: wrap; }
    .scenario-stat label { font-size: 10px; color: var(--gray-500); display: block; }
    .scenario-stat .val { font-size: 14px; font-weight: 700; }

    /* Scenario compare table */
    .s-compare { overflow-x: auto; }
    .s-compare table { min-width: 600px; }
    .s-compare .best { color: var(--green); font-weight: 700; }
    .s-compare .worst { color: var(--red); }

    /* Badge */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-orange { background: var(--primary-light); color: var(--primary); }
    .badge-green { background: var(--green-light); color: var(--green); }
    .badge-red { background: var(--red-light); color: var(--red); }
    .badge-gray { background: var(--gray-100); color: var(--gray-500); }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 48px;
      color: var(--gray-500);
    }
    .empty-icon { font-size: 36px; margin-bottom: 12px; }
    .empty p { font-size: 14px; }

    /* Section header */
    .section-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: .06em;
      padding: 8px 0 6px;
    }

    @media (max-width: 700px) {
      .grid-2, .grid-3 { grid-template-columns: 1fr; }
      .result-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">🚀 로켓런칭 시뮬레이터</div>
    <nav class="tabs">
      <button class="tab active" onclick="showTab('sim')">시뮬레이션</button>
      <button class="tab" onclick="showTab('actual')">실적 입력</button>
      <button class="tab" onclick="showTab('compare')">비교 분석</button>
      <button class="tab" onclick="showTab('scenarios')">시나리오 비교</button>
    </nav>
  </div>
</header>

<!-- ======================== TAB 1: 시뮬레이션 ======================== -->
<div id="page-sim" class="page active">
  <div class="container">
    <div class="grid-2">

      <!-- 입력 -->
      <div>
        <div class="card">
          <div class="card-title">📥 기본 설정</div>
          <div class="field">
            <label>객단가</label>
            <div class="field-unit">
              <input type="number" id="s-price" value="297" min="0" oninput="calcSim()">
              <span class="unit">만원</span>
            </div>
          </div>
          <div class="field">
            <label>수용 인원</label>
            <div class="field-unit">
              <input type="number" id="s-cap" value="20" min="0" oninput="calcSim()">
              <span class="unit">명</span>
            </div>
            <div class="hint">최대 결제 가능 인원 (0 = 제한 없음)</div>
          </div>
          <div class="field">
            <label>수수료율</label>
            <div class="field-unit">
              <input type="number" id="s-fee" value="30" min="0" max="100" step="0.1" oninput="calcSim()">
              <span class="unit">%</span>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">📣 광고</div>
          <div class="field">
            <label>총 광고비</label>
            <div class="field-unit">
              <input type="number" id="s-adcost" value="100" min="0" oninput="calcSim()">
              <span class="unit">만원</span>
            </div>
          </div>
          <div class="field">
            <label>CAC (결과당 비용)</label>
            <div class="field-unit">
              <input type="number" id="s-cac" value="5" min="0.1" step="0.1" oninput="calcSim()">
              <span class="unit">천원</span>
            </div>
            <div class="hint">메타 광고의 "결과당 비용" 기준</div>
          </div>
          <div class="field">
            <label>오거닉 신청자</label>
            <div class="field-unit">
              <input type="number" id="s-organic" value="0" min="0" oninput="calcSim()">
              <span class="unit">명</span>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">📊 전환율</div>
          <div class="grid-2">
            <div class="field">
              <label>참석률</label>
              <div class="field-unit">
                <input type="number" id="s-attend" value="40" min="0" max="100" oninput="calcSim()">
                <span class="unit">%</span>
              </div>
            </div>
            <div class="field">
              <label>FT 참석률</label>
              <div class="field-unit">
                <input type="number" id="s-ft" value="80" min="0" max="100" oninput="calcSim()">
                <span class="unit">%</span>
              </div>
              <div class="hint">끝까지 참석한 비율</div>
            </div>
            <div class="field">
              <label>결제 CVR</label>
              <div class="field-unit">
                <input type="number" id="s-cvr" value="10" min="0" max="100" step="0.1" oninput="calcSim()">
                <span class="unit">%</span>
              </div>
            </div>
          </div>
        </div>

        <div style="text-align:right; margin-top:4px;">
          <button class="btn btn-primary" onclick="saveScenario()">💾 시나리오 저장</button>
        </div>
      </div>

      <!-- 결과 -->
      <div>
        <div class="card">
          <div class="card-title">🔢 퍼널 예측</div>
          <div class="funnel" id="funnel-sim"></div>
        </div>

        <div class="card">
          <div class="card-title">💰 매출 예측</div>
          <div class="result-grid" id="result-sim"></div>
        </div>

        <div class="card">
          <div class="card-title">📈 손익 분기</div>
          <div id="breakeven-sim" style="font-size:13px; color:var(--gray-700); line-height:1.8;"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ======================== TAB 2: 실적 입력 ======================== -->
<div id="page-actual" class="page">
  <div class="container">
    <div class="grid-2">

      <!-- 입력 -->
      <div>
        <div class="card">
          <div class="card-title">📥 기본 설정</div>
          <div class="grid-2">
            <div class="field">
              <label>객단가</label>
              <div class="field-unit">
                <input type="number" id="a-price" value="297" min="0" oninput="calcActual()">
                <span class="unit">만원</span>
              </div>
            </div>
            <div class="field">
              <label>수수료율</label>
              <div class="field-unit">
                <input type="number" id="a-fee" value="30" min="0" max="100" step="0.1" oninput="calcActual()">
                <span class="unit">%</span>
              </div>
            </div>
          </div>
          <div class="field">
            <label>외주비</label>
            <div class="field-unit">
              <input type="number" id="a-outsource" value="0" min="0" oninput="calcActual()">
              <span class="unit">만원</span>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">📣 광고 실적</div>
          <div class="field">
            <label>총 광고비</label>
            <div class="field-unit">
              <input type="number" id="a-adcost" value="" placeholder="0" min="0" oninput="calcActual()">
              <span class="unit">만원</span>
            </div>
          </div>
          <div class="grid-2">
            <div class="field">
              <label>광고 노출수</label>
              <div class="field-unit">
                <input type="number" id="a-impression" value="" placeholder="0" min="0" oninput="calcActual()">
                <span class="unit">회</span>
              </div>
            </div>
            <div class="field">
              <label>광고 클릭수</label>
              <div class="field-unit">
                <input type="number" id="a-click" value="" placeholder="0" min="0" oninput="calcActual()">
                <span class="unit">회</span>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">👥 신청 & 참석</div>
          <div class="grid-2">
            <div class="field">
              <label>광고 신청자</label>
              <div class="field-unit">
                <input type="number" id="a-ad-reg" value="" placeholder="0" min="0" oninput="calcActual()">
                <span class="unit">명</span>
              </div>
            </div>
            <div class="field">
              <label>오거닉 신청자</label>
              <div class="field-unit">
                <input type="number" id="a-org-reg" value="" placeholder="0" min="0" oninput="calcActual()">
                <span class="unit">명</span>
              </div>
            </div>
            <div class="field">
              <label>참석자</label>
              <div class="field-unit">
                <input type="number" id="a-attend" value="" placeholder="0" min="0" oninput="calcActual()">
                <span class="unit">명</span>
              </div>
            </div>
            <div class="field">
              <label>FT 참석자</label>
              <div class="field-unit">
                <input type="number" id="a-ft" value="" placeholder="0" min="0" oninput="calcActual()">
                <span class="unit">명</span>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">💳 결제</div>
          <div class="grid-2">
            <div class="field">
              <label>구매자 수</label>
              <div class="field-unit">
                <input type="number" id="a-buyers" value="" placeholder="0" min="0" oninput="calcActual()">
                <span class="unit">명</span>
              </div>
            </div>
            <div class="field">
              <label>달성 거래액</label>
              <div class="field-unit">
                <input type="number" id="a-gmv" value="" placeholder="0" min="0" oninput="calcActual()">
                <span class="unit">만원</span>
              </div>
              <div class="hint">부가세 포함 금액</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 결과 -->
      <div>
        <div class="card">
          <div class="card-title">🔢 실적 퍼널</div>
          <div class="funnel" id="funnel-actual"></div>
        </div>

        <div class="card">
          <div class="card-title">📊 자동 계산 지표</div>
          <div class="result-grid" id="result-actual"></div>
        </div>

        <div class="card">
          <div class="card-title">💰 손익 결과</div>
          <div class="result-grid" id="pnl-actual"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ======================== TAB 3: 비교 분석 ======================== -->
<div id="page-compare" class="page">
  <div class="container">
    <div class="card">
      <div class="card-title">📊 시뮬레이션 vs 실적 비교</div>
      <div id="compare-content"></div>
    </div>
  </div>
</div>

<!-- ======================== TAB 4: 시나리오 비교 ======================== -->
<div id="page-scenarios" class="page">
  <div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <h2 style="font-size:16px; font-weight:700;">저장된 시나리오</h2>
      <button class="btn btn-danger btn-sm" onclick="clearScenarios()">전체 삭제</button>
    </div>
    <div id="scenario-list"></div>
    <div class="card" style="margin-top:16px;" id="scenario-compare-section" style="display:none;">
      <div class="card-title">🔎 시나리오 비교표</div>
      <div class="s-compare" id="scenario-compare-table"></div>
    </div>
  </div>
</div>

<!-- Save scenario modal overlay -->
<div id="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:999; align-items:center; justify-content:center;">
  <div style="background:#fff; border-radius:16px; padding:24px; width:360px; box-shadow:0 20px 40px rgba(0,0,0,.15);">
    <div style="font-size:16px; font-weight:700; margin-bottom:16px;">시나리오 저장</div>
    <div class="field">
      <label>시나리오 이름</label>
      <input type="text" id="scenario-name-input" placeholder="예: 보수적 / 공격적 / 1차 런칭" style="width:100%">
    </div>
    <div style="display:flex; gap:8px; margin-top:16px; justify-content:flex-end;">
      <button class="btn btn-secondary" onclick="closeModal()">취소</button>
      <button class="btn btn-primary" onclick="confirmSave()">저장</button>
    </div>
  </div>
</div>

<script>
// ===================== STATE =====================
let simResult = {};
let actualResult = {};
let scenarios = JSON.parse(localStorage.getItem('rls_scenarios') || '[]');

// ===================== TAB =====================
function showTab(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'compare') renderCompare();
  if (name === 'scenarios') renderScenarios();
}

// ===================== HELPERS =====================
function fmt(n, dp=0) {
  if (!isFinite(n) || isNaN(n)) return '-';
  return n.toLocaleString('ko', { maximumFractionDigits: dp, minimumFractionDigits: dp });
}
function fmtPct(n) {
  if (!isFinite(n) || isNaN(n)) return '-';
  return n.toFixed(1) + '%';
}
function v(id) { return parseFloat(document.getElementById(id).value) || 0; }

// ===================== SIMULATION CALC =====================
function calcSim() {
  const price = v('s-price');
  const cap   = v('s-cap');
  const fee   = v('s-fee') / 100;
  const adcost= v('s-adcost');
  const cac   = v('s-cac');
  const organic = v('s-organic');
  const attendRate = v('s-attend') / 100;
  const ftRate = v('s-ft') / 100;
  const cvr   = v('s-cvr') / 100;

  const adReg = cac > 0 ? (adcost * 10) / cac : 0;
  const totalReg = adReg + organic;
  const attends = totalReg * attendRate;
  const ftAttends = attends * ftRate;
  const rawBuyers = ftAttends * cvr;
  const buyers = cap > 0 ? Math.min(rawBuyers, cap) : rawBuyers;
  const gmv = buyers * price;
  const revenue = gmv / 1.1;
  const feeAmt = gmv * fee;
  const contribution = revenue - adcost - feeAmt;
  const roas = adcost > 0 ? (revenue / adcost) * 100 : 0;

  simResult = { price, cap, fee, adcost, cac, organic, attendRate, ftRate, cvr,
    adReg, totalReg, attends, ftAttends, buyers, gmv, revenue, feeAmt, contribution, roas };

  // Funnel
  document.getElementById('funnel-sim').innerHTML = funnelHTML([
    { label:'광고신청', n: adReg, rate: null },
    { label:'총신청', n: totalReg, rate: null },
    { label:'참석', n: attends, rate: attendRate },
    { label:'FT참석', n: ftAttends, rate: ftRate },
    { label:'결제', n: buyers, rate: cvr },
  ]);

  // Results
  document.getElementById('result-sim').innerHTML = `
    <div class="result-item highlight">
      <label>거래액</label>
      <span class="value">${fmt(gmv)}</span><span class="value-unit">만원</span>
    </div>
    <div class="result-item highlight-green">
      <label>공헌이익</label>
      <span class="value">${fmt(contribution)}</span><span class="value-unit">만원</span>
    </div>
    <div class="result-item">
      <label>순매출</label>
      <span class="value">${fmt(revenue, 1)}</span><span class="value-unit">만원</span>
    </div>
    <div class="result-item">
      <label>결제자</label>
      <span class="value">${fmt(buyers, 1)}</span><span class="value-unit">명</span>
    </div>
    <div class="result-item">
      <label>수수료</label>
      <span class="value">${fmt(feeAmt, 1)}</span><span class="value-unit">만원</span>
    </div>
    <div class="result-item">
      <label>ROAS</label>
      <span class="value">${fmt(roas)}</span><span class="value-unit">%</span>
    </div>
  `;

  // Breakeven
  const beGmv = (adcost + 0) / (1 / 1.1 - fee);
  const beBuyers = price > 0 ? beGmv / price : 0;
  const profitTag = contribution >= 0
    ? `<span class="badge badge-green">흑자</span>`
    : `<span class="badge badge-red">적자</span>`;
  document.getElementById('breakeven-sim').innerHTML = `
    손익 분기 거래액: <b>${fmt(beGmv, 0)}만원</b> (약 ${fmt(beBuyers, 1)}명)<br>
    현재 예상: <b>${fmt(gmv, 0)}만원</b> &nbsp;${profitTag}<br>
    공헌이익률: <b>${fmtPct(gmv > 0 ? contribution / revenue * 100 : 0)}</b>
  `;
}

// ===================== ACTUAL CALC =====================
function calcActual() {
  const price     = v('a-price');
  const fee       = v('a-fee') / 100;
  const outsource = v('a-outsource');
  const adcost    = v('a-adcost');
  const impression= v('a-impression');
  const click     = v('a-click');
  const adReg     = v('a-ad-reg');
  const orgReg    = v('a-org-reg');
  const attends   = v('a-attend');
  const ftAttends = v('a-ft');
  const buyers    = v('a-buyers');
  const gmv       = v('a-gmv');

  const totalReg  = adReg + orgReg;
  const revenue   = gmv / 1.1;
  const feeAmt    = gmv * fee;
  const contribution = revenue - adcost - feeAmt - outsource;

  const cac      = adReg > 0 ? (adcost * 1000 / adReg) : 0; // 천원
  const ctr      = impression > 0 ? click / impression * 100 : 0;
  const regCvr   = click > 0 ? adReg / click * 100 : 0;
  const attendRate= totalReg > 0 ? attends / totalReg * 100 : 0;
  const ftRate   = attends > 0 ? ftAttends / attends * 100 : 0;
  const buyCvr   = ftAttends > 0 ? buyers / ftAttends * 100 : 0;
  const roas     = adcost > 0 ? revenue / adcost * 100 : 0;

  actualResult = { price, fee, outsource, adcost, impression, click, adReg, orgReg,
    attends, ftAttends, buyers, gmv, revenue, feeAmt, contribution, outsource,
    cac, ctr, regCvr, attendRate, ftRate, buyCvr, roas, totalReg };

  // Funnel
  document.getElementById('funnel-actual').innerHTML = funnelHTML([
    { label:'광고신청', n: adReg, rate: null },
    { label:'총신청', n: totalReg, rate: null },
    { label:'참석', n: attends, rate: totalReg > 0 ? attends/totalReg : 0 },
    { label:'FT참석', n: ftAttends, rate: attends > 0 ? ftAttends/attends : 0 },
    { label:'결제', n: buyers, rate: ftAttends > 0 ? buyers/ftAttends : 0 },
  ]);

  // Metrics
  document.getElementById('result-actual').innerHTML = `
    <div class="result-item">
      <label>CAC (실제)</label>
      <span class="value">${fmt(cac, 1)}</span><span class="value-unit">천원</span>
    </div>
    <div class="result-item">
      <label>CTR</label>
      <span class="value">${fmtPct(ctr)}</span>
    </div>
    <div class="result-item">
      <label>등록 CVR</label>
      <span class="value">${fmtPct(regCvr)}</span>
    </div>
    <div class="result-item">
      <label>참석률</label>
      <span class="value">${fmtPct(attendRate)}</span>
    </div>
    <div class="result-item">
      <label>FT 참석률</label>
      <span class="value">${fmtPct(ftRate)}</span>
    </div>
    <div class="result-item">
      <label>결제 CVR</label>
      <span class="value">${fmtPct(buyCvr)}</span>
    </div>
    <div class="result-item">
      <label>ROAS</label>
      <span class="value">${fmt(roas)}</span><span class="value-unit">%</span>
    </div>
  `;

  // P&L
  const profitBadge = contribution >= 0
    ? `<span class="badge badge-green">흑자</span>`
    : `<span class="badge badge-red">적자</span>`;
  document.getElementById('pnl-actual').innerHTML = `
    <div class="result-item highlight">
      <label>거래액</label>
      <span class="value">${fmt(gmv)}</span><span class="value-unit">만원</span>
    </div>
    <div class="result-item highlight-green">
      <label>공헌이익 ${profitBadge}</label>
      <span class="value">${fmt(contribution)}</span><span class="value-unit">만원</span>
    </div>
    <div class="result-item">
      <label>순매출</label>
      <span class="value">${fmt(revenue, 1)}</span><span class="value-unit">만원</span>
    </div>
    <div class="result-item">
      <label>수수료</label>
      <span class="value">${fmt(feeAmt, 1)}</span><span class="value-unit">만원</span>
    </div>
    <div class="result-item">
      <label>외주비</label>
      <span class="value">${fmt(outsource)}</span><span class="value-unit">만원</span>
    </div>
    <div class="result-item">
      <label>광고비</label>
      <span class="value">${fmt(adcost)}</span><span class="value-unit">만원</span>
    </div>
  `;
}

// ===================== FUNNEL HTML =====================
function funnelHTML(steps) {
  return steps.map((s, i) => {
    const rateStr = s.rate !== null && s.rate > 0 ? `<span class="funnel-rate">${(s.rate*100).toFixed(0)}%→</span>` : (i > 0 ? '<span class="funnel-arrow">→</span>' : '');
    const arrow = i < steps.length - 1 ? '' : '';
    return `
      ${i > 0 ? (s.rate !== null && isFinite(s.rate) ? `<div class="funnel-arrow" style="font-size:12px; color:var(--primary); margin-top:12px;">${(s.rate*100).toFixed(0)}%<br>→</div>` : '<div class="funnel-arrow">→</div>') : ''}
      <div class="funnel-step">
        <label>${s.label}</label>
        <span class="num">${fmt(s.n, 0) === '-' ? '0' : fmt(s.n, 1)}</span>
        <span style="font-size:10px;color:var(--gray-500)">명</span>
      </div>
    `;
  }).join('');
}

// ===================== COMPARE =====================
function renderCompare() {
  const s = simResult;
  const a = actualResult;

  if (!s.gmv && !a.gmv) {
    document.getElementById('compare-content').innerHTML = `
      <div class="empty">
        <div class="empty-icon">📋</div>
        <p>시뮬레이션과 실적 데이터를 입력하면<br>자동으로 비교됩니다.</p>
      </div>`;
    return;
  }

  function row(label, sVal, aVal, unit='', higherBetter=true) {
    const sv = parseFloat(sVal) || 0;
    const av = parseFloat(aVal) || 0;
    const diff = av - sv;
    const diffStr = isFinite(diff) && sv !== 0
      ? `<span class="${diff > 0 ? (higherBetter ? 'diff-pos' : 'diff-neg') : (diff < 0 ? (higherBetter ? 'diff-neg' : 'diff-pos') : '')}">${diff > 0 ? '+' : ''}${fmt(diff, 1)}${unit}</span>`
      : '-';
    return `<tr>
      <td>${label}</td>
      <td>${fmt(sv, 1)}${unit}</td>
      <td>${fmt(av, 1)}${unit}</td>
      <td>${diffStr}</td>
    </tr>`;
  }

  document.getElementById('compare-content').innerHTML = `
    <table class="compare-table">
      <thead>
        <tr>
          <th>항목</th>
          <th>시뮬레이션</th>
          <th>실적</th>
          <th>차이</th>
        </tr>
      </thead>
      <tbody>
        <tr class="section-header"><td colspan="4">📣 광고</td></tr>
        ${row('광고비', s.adcost, a.adcost, '만원', false)}
        ${row('CAC', s.cac, a.cac, '천원', false)}
        <tr class="section-header"><td colspan="4">👥 퍼널</td></tr>
        ${row('광고 신청자', s.adReg, a.adReg, '명')}
        ${row('총 신청자', s.totalReg, a.totalReg, '명')}
        ${row('참석자', s.attends, a.attends, '명')}
        ${row('FT 참석자', s.ftAttends, a.ftAttends, '명')}
        ${row('결제자', s.buyers, a.buyers, '명')}
        <tr class="section-header"><td colspan="4">📊 전환율</td></tr>
        ${row('참석률', (s.attendRate||0)*100, a.attendRate, '%')}
        ${row('FT 참석률', (s.ftRate||0)*100, a.ftRate, '%')}
        ${row('결제 CVR', (s.cvr||0)*100, a.buyCvr, '%')}
        <tr class="section-header"><td colspan="4">💰 매출</td></tr>
        ${row('거래액', s.gmv, a.gmv, '만원')}
        ${row('순매출', s.revenue, a.revenue, '만원')}
        ${row('공헌이익', s.contribution, a.contribution, '만원')}
        ${row('ROAS', s.roas, a.roas, '%')}
      </tbody>
    </table>`;
}

// ===================== SCENARIOS =====================
function saveScenario() {
  document.getElementById('scenario-name-input').value = '';
  document.getElementById('modal').style.display = 'flex';
  setTimeout(() => document.getElementById('scenario-name-input').focus(), 50);
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

function confirmSave() {
  const name = document.getElementById('scenario-name-input').value.trim() || '시나리오 ' + (scenarios.length + 1);
  const s = { ...simResult };
  scenarios.push({
    id: Date.now(),
    name,
    date: new Date().toLocaleDateString('ko'),
    ...s,
  });
  localStorage.setItem('rls_scenarios', JSON.stringify(scenarios));
  closeModal();
  showToast('시나리오가 저장되었습니다.');
}

function deleteScenario(id) {
  scenarios = scenarios.filter(s => s.id !== id);
  localStorage.setItem('rls_scenarios', JSON.stringify(scenarios));
  renderScenarios();
}

function clearScenarios() {
  if (!confirm('저장된 시나리오를 모두 삭제할까요?')) return;
  scenarios = [];
  localStorage.removeItem('rls_scenarios');
  renderScenarios();
}

function loadScenario(id) {
  const s = scenarios.find(x => x.id === id);
  if (!s) return;
  document.getElementById('s-price').value = s.price || '';
  document.getElementById('s-cap').value = s.cap || '';
  document.getElementById('s-fee').value = (s.fee || 0) * 100;
  document.getElementById('s-adcost').value = s.adcost || '';
  document.getElementById('s-cac').value = s.cac || '';
  document.getElementById('s-organic').value = s.organic || '';
  document.getElementById('s-attend').value = (s.attendRate || 0) * 100;
  document.getElementById('s-ft').value = (s.ftRate || 0) * 100;
  document.getElementById('s-cvr').value = (s.cvr || 0) * 100;
  calcSim();
  showTab_name('sim');
  showToast(`"${s.name}" 시나리오를 불러왔습니다.`);
}

function showTab_name(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('.tab')[0].classList.add('active');
}

function renderScenarios() {
  const container = document.getElementById('scenario-list');
  if (scenarios.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">💾</div><p>저장된 시나리오가 없습니다.<br>시뮬레이션 탭에서 저장해보세요.</p></div>`;
    document.getElementById('scenario-compare-section').style.display = 'none';
    return;
  }

  container.innerHTML = `<div class="scenario-list">${scenarios.map(s => `
    <div class="scenario-card">
      <div class="scenario-card-header">
        <div>
          <div class="scenario-name">${s.name}</div>
          <div class="scenario-meta">${s.date} · 객단가 ${fmt(s.price)}만원</div>
        </div>
        <button class="btn btn-danger btn-sm" onclick="deleteScenario(${s.id})">삭제</button>
      </div>
      <div class="scenario-stats">
        <div class="scenario-stat"><label>광고비</label><span class="val">${fmt(s.adcost)}만</span></div>
        <div class="scenario-stat"><label>CAC</label><span class="val">${fmt(s.cac, 1)}천</span></div>
        <div class="scenario-stat"><label>결제자</label><span class="val">${fmt(s.buyers, 1)}명</span></div>
        <div class="scenario-stat"><label>거래액</label><span class="val">${fmt(s.gmv)}만</span></div>
        <div class="scenario-stat"><label>공헌이익</label>
          <span class="val" style="color:${s.contribution>=0?'var(--green)':'var(--red)'}">${fmt(s.contribution)}만</span>
        </div>
      </div>
      <div style="margin-top:12px; display:flex; gap:6px;">
        <button class="btn btn-secondary btn-sm" onclick="loadScenario(${s.id})">📥 불러오기</button>
      </div>
    </div>
  `).join('')}</div>`;

  // Compare table
  if (scenarios.length >= 2) {
    document.getElementById('scenario-compare-section').style.display = 'block';
    const metrics = [
      { key: 'adcost', label: '광고비', unit: '만', better: 'low' },
      { key: 'cac', label: 'CAC', unit: '천원', better: 'low' },
      { key: 'buyers', label: '결제자', unit: '명', better: 'high' },
      { key: 'gmv', label: '거래액', unit: '만', better: 'high' },
      { key: 'revenue', label: '순매출', unit: '만', better: 'high' },
      { key: 'contribution', label: '공헌이익', unit: '만', better: 'high' },
      { key: 'roas', label: 'ROAS', unit: '%', better: 'high' },
    ];

    const header = `<tr><th>항목</th>${scenarios.map(s => `<th>${s.name}</th>`).join('')}</tr>`;
    const rows = metrics.map(m => {
      const vals = scenarios.map(s => s[m.key] || 0);
      const best = m.better === 'high' ? Math.max(...vals) : Math.min(...vals);
      const worst = m.better === 'high' ? Math.min(...vals) : Math.max(...vals);
      const cells = vals.map(v => {
        let cls = '';
        if (v === best && vals.filter(x => x === best).length < vals.length) cls = 'best';
        else if (v === worst && vals.filter(x => x === worst).length < vals.length) cls = 'worst';
        return `<td class="${cls}">${fmt(v, 1)}${m.unit}</td>`;
      }).join('');
      return `<tr><td>${m.label}</td>${cells}</tr>`;
    }).join('');

    document.getElementById('scenario-compare-table').innerHTML = `
      <table class="compare-table"><thead>${header}</thead><tbody>${rows}</tbody></table>
    `;
  } else {
    document.getElementById('scenario-compare-section').style.display = 'none';
  }
}

// ===================== TOAST =====================
function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:#333;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;
    z-index:9999;animation:fadeIn .2s;`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ===================== KEYBOARD =====================
document.getElementById('scenario-name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmSave();
  if (e.key === 'Escape') closeModal();
});
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// ===================== INIT =====================
calcSim();
calcActual();
</script>
</body>
</html>
